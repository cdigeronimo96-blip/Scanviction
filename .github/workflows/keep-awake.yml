# Keep the Streamlit Community Cloud app from hibernating.
#
# Community Cloud sleeps an app after inactivity, and its idle timer keys on real VIEWER sessions
# (websockets) — a plain HTTP ping usually doesn't reset it. So this loads the app in a real headless
# browser (Playwright), wakes it if it's already asleep, and holds the session open ~15s so it counts
# as activity. Runs on a schedule; Actions minutes are FREE on public repos.
#
# This is a band-aid — it does NOT fix the 1GB/cold-start ceiling. The real fix is an always-on host
# (Render / Railway / Fly / a small VPS). See the architecture notes in the chat.
name: keep-awake
on:
  schedule:
    - cron: "*/10 * * * *"   # ~every 10 min (GitHub may delay/skip some under load — that's fine)
  workflow_dispatch: {}       # manual "Run workflow" button

# Don't pile up overlapping runs if one is slow.
concurrency:
  group: keep-awake
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Install Playwright
        run: |
          pip install --quiet playwright
          python -m playwright install --with-deps chromium

      - name: Load the app (wake it + hold a real session)
        # Point this at your live app. On Render (always-on) this load is what STARTS the
        # in-process worker after a deploy (Streamlit only runs the script on a real session).
        # Set a repo Variable named APP_URL to switch targets without editing this file.
        env:
          KEEP_AWAKE_URL: ${{ vars.APP_URL || 'https://marketsignalpro.streamlit.app' }}
        run: |
          python - <<'PY'
          import os
          from playwright.sync_api import sync_playwright
          URL = os.environ.get("KEEP_AWAKE_URL", "https://marketsignalpro.streamlit.app")
          with sync_playwright() as p:
              b = p.chromium.launch()
              pg = b.new_page()
              pg.goto(URL, wait_until="domcontentloaded", timeout=120000)
              woke = False
              for _ in range(12):
                  pg.wait_for_timeout(4000)
                  body = pg.inner_text("body") or ""
                  low = body.lower()
                  # If it's asleep, Streamlit shows a "get this app back up" button — click it.
                  if ("back up" in low) or ("gone to sleep" in low) or ("wake" in low):
                      for btn in pg.query_selector_all("button"):
                          t = (btn.inner_text() or "").lower()
                          if "back up" in t or "wake" in t:
                              try: btn.click()
                              except Exception: pass
                              break
                  if ("conviction" in low) or ("MarketSignalPro" in body) or ("Top Signals" in body):
                      woke = True
                      break
              pg.wait_for_timeout(15000)   # hold the session so the idle timer resets
              b.close()
          print("keep-awake: app rendered" if woke else "keep-awake: loaded (content not confirmed)")
          PY
