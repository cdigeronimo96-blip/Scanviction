# Daily build + deploy of the MarketSignalPro SEO static site (see SEO_README.md).
#
# ── ONE-TIME SETUP ────────────────────────────────────────────────────────────
# 1. Create a Cloudflare Pages project (or Netlify site) for the SEO domain.
# 2. Add these repo secrets (Settings → Secrets and variables → Actions):
#      CF_API_TOKEN        Cloudflare API token with "Pages: Edit"
#      CF_ACCOUNT_ID       your Cloudflare account id
#      SEO_SNAPSHOT_URL    (optional) a URL that returns universe_snapshot.json
#    ...OR skip the token and just commit universe_snapshot.json to the repo root.
# 3. Point a subdomain (e.g. www. or stocks.) at the Pages project.
#
# ── SNAPSHOT SOURCE ───────────────────────────────────────────────────────────
# The app writes .msp_data/universe_snapshot.json on each warm (seo_export.py). That
# lives on the app server, which this Action can't read directly, so pick one:
#   • Easiest: periodically commit universe_snapshot.json to the repo root.
#   • Or: expose it at SEO_SNAPSHOT_URL (object storage / a small endpoint) and this
#     Action curls it below.
name: build-seo
on:
  schedule:
    - cron: "30 22 * * 1-5"   # ~after US market close, weekdays (UTC)
  workflow_dispatch: {}         # manual "Run workflow" button

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch snapshot (from URL if provided, else use committed file)
        run: |
          if [ -n "${{ secrets.SEO_SNAPSHOT_URL }}" ]; then
            curl -fsSL "${{ secrets.SEO_SNAPSHOT_URL }}" -o universe_snapshot.json
          fi
          if [ ! -f universe_snapshot.json ]; then
            echo "::error::No universe_snapshot.json (set SEO_SNAPSHOT_URL or commit the file)."; exit 1
          fi
          python -c "import json;d=json.load(open('universe_snapshot.json'));print('snapshot rows:',d.get('count'))"

      - name: Generate the static site
        run: |
          python seo_generate.py \
            --snapshot universe_snapshot.json \
            --out seo_site \
            --site-url https://www.marketsignalpro.com \
            --app-url  https://marketsignalpro.streamlit.app

      # ── Deploy (Cloudflare Pages). Swap for netlify/actions if you prefer. ──
      - name: Deploy to Cloudflare Pages
        if: ${{ secrets.CF_API_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy seo_site --project-name=marketsignalpro-seo

      - name: Upload site as artifact (fallback when no CF token yet)
        if: ${{ secrets.CF_API_TOKEN == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: seo_site
          path: seo_site
