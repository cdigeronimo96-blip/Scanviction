# Scanviction — Render deployment (ALWAYS-ON).
#
# WHY RENDER (vs Streamlit Cloud): Streamlit Cloud hibernates when idle, so the in-process
# universe worker stops and prices/signals go stale. An always-on service keeps that worker
# ticking 24/7 → intraday signals re-score every ~15 min all session and prices stay fresh
# (see INTRADAY_SIGNALS in app.py). Alerts + the signal/email digest also run INLINE in this
# service now, so no separate cron worker is needed.
#
# ►► MUST be a PAID plan. Render's FREE web tier spins down after ~15 min idle — that's the
#    exact hibernation you're leaving. ◄◄
# ►► RAM: the whole-market warm (~2,500 tickers, cached frames) needs ~1GB, so use
#    `standard` (2GB, ~$25/mo). `starter` is only 512MB and will likely OOM on the full
#    universe — use it ONLY if you also cut POLY_MAX_UNIVERSE to ~800-1000. ◄◄
#
# ── ONE-TIME SETUP ────────────────────────────────────────────────────────────
# 1. Render dashboard → New → Blueprint → connect the GitHub repo (this render.yaml
#    provisions the service).
# 2. On the service → Environment → **Secret Files** → add a file named:
#         .streamlit/secrets.toml
#    and paste the SAME content as your Streamlit Cloud secrets (Polygon, DATABASE_URL,
#    Stripe, Resend, Telegram, Anthropic, EMAIL_FROM, APP_URL, …). Streamlit reads
#    st.secrets from it AND exposes the top-level keys as env vars. NEVER commit secrets.
# 3. Set APP_URL (in that secrets file) to the new Render URL once it's assigned
#    (https://scanviction.onrender.com, or your custom domain).
# 4. Point the keep-awake GitHub Action (.github/workflows/keep-awake.yml) at the new URL —
#    Streamlit only starts the in-process worker when a real session connects, so one
#    headless load after each deploy kicks it off (it then runs continuously on the always-on
#    process). Render's own health checks hit /_stcore/health and do NOT start a session.
services:
  - type: web
    name: scanviction
    runtime: python
    plan: standard                # ALWAYS-ON, 2GB RAM (~$25/mo) — headroom for the 2,500-ticker
                                  # warm. `starter` (512MB, ~$7) OOMs unless you cut POLY_MAX_UNIVERSE.
                                  # Do NOT use free — it spins down (hibernation).
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --browser.gatherUsageStats false
    healthCheckPath: /_stcore/health   # if Render marks it unhealthy, try /healthz
    autoDeploy: true              # redeploy on push to the connected branch
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"
      - key: INTRADAY_SIGNALS
        value: "1"                # append today's delayed bar + re-score intraday
      - key: INTRADAY_RESCORE
        value: "900"              # market-hours re-score cadence, seconds (lower = finer)
      # POLYGON_API_KEY, DATABASE_URL, Stripe, Resend, Telegram, Anthropic, EMAIL_FROM,
      # APP_URL, etc. all come from the .streamlit/secrets.toml Secret File (step 2 above).

# ── RETIRED: the separate cron alerts worker ──────────────────────────────────
# Price alerts + the signal/email digest now run INLINE in the always-on web service above
# (app._process_price_alerts + app._deliver_new_signals), so the old `type: cron` worker is
# no longer required. If you ever want standalone automatic outcome tracking, re-add a cron
# running `python alerts_worker.py` (WORKER_MODE=once) with the SAME DATABASE_URL +
# POLYGON_API_KEY — but leave WORKER_DELIVERS_PRICE_ALERTS / WORKER_DELIVERS_SIGNALS OFF so
# it can't double-send what the app already delivers.
